<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiegel im Spiegel</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #754e79 0%, #130614 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        canvas { display: block; }
        
        /* 啟動介面 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); z-index: 100; transition: opacity 0.5s;
        }
        #start-btn {
            padding: 20px 40px; background: #fff; color: #000;
            border: none; border-radius: 50px; font-weight: bold;
            font-size: 1rem; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        
        #video-feed { display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">𝔠𝔯𝔶𝔰𝔱𝔞𝔩🪞🪞𝔪𝔦𝔯𝔯𝔬𝔯</button>
    </div>
    
    <video id="video-feed" autoplay playsinline muted></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('video-feed');

        let scene, camera, renderer, controls, videoTexture, myModel;

        // --- 1. 相機設定 (後置鏡頭) ---
        async function setupCamera() {
            try {
                const constraints = {
                    video: { facingMode: "user" },
                    audio: false
                };
                // 嘗試強制後置鏡頭，若失敗則使用預設
                const stream = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }));
                
                video.srcObject = stream;
                return new Promise(resolve => video.onloadedmetadata = resolve);
            } catch (err) {
                console.error("相機啟動失敗:", err);
                alert("無法存取後置鏡頭，請檢查 HTTPS 設定與權限。");
            }
        }

        // --- 2. Three.js 場景初始化 ---
        function initThree() {
            // 場景與背景
            scene = new THREE.Scene();
            
            // 攝影機
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 1.5);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            // --- 燈光設定：極端反差與金屬質感 ---

                // 1. 大幅降低環境光 (環境光會吃掉陰影，金屬感需要深色暗面)
                const ambientLight = new THREE.AmbientLight(0xc209c9, 4); 
                scene.add(ambientLight);

                // 2. 主光源 (Key Light)：強烈的紫色光，從側面射入
                const mainLight = new THREE.DirectionalLight(0xeaa2ff, 10.0);
                mainLight.position.set(5, 5, 2);
                scene.add(mainLight);

                // 3. 輪廓光 (Rim Light)：從後方或側後方射入的強光，勾勒出金屬邊緣
                const rimLight = new THREE.SpotLight(0x81fffb, 20.0);
                rimLight.position.set(5, 5, 10);
                rimLight.angle = 0.5;
                rimLight.penumbra = 0.1; // 邊緣銳利化
                scene.add(rimLight);

                // 4. 補光 (Fill Light)：深藍色，確保暗面不至於完全漆黑，但保持冷色調
                const pointLight = new THREE.PointLight(0xca00cc, 5.0);
                pointLight.position.set(5, 5, 10);
                scene.add(pointLight);

            // 控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 影片紋理
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.colorSpace = THREE.SRGBColorSpace;

            // --- 3. 載入 GLB 模型 ---
            const loader = new GLTFLoader();
            loader.load('crystal.glb', (gltf) => {
                myModel = gltf.scene;
                
                myModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({ 
                            map: videoTexture,
                            transparent: true,
                            opacity: 0.8,      // 稍微提高不透明度，金屬感會更重
                            metalness: 2.0,    // 設為 1.0 達致完全金屬感
                            roughness: 0.5,   // 極低粗糙度，產生像鏡面一樣的銳利亮點
                            side: THREE.DoubleSide,
                            emissive: 0x000000 // 確保沒有自發光干擾對比
                        });
                    }
                });

                // 自動居中模型
                const box = new THREE.Box3().setFromObject(myModel);
                const center = box.getCenter(new THREE.Vector3());
                myModel.position.sub(center);
                
                scene.add(myModel);
            }, undefined, (error) => {
                console.error('模型載入錯誤:', error);
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. 動畫迴圈 ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 模型持續向右自轉 (繞 Y 軸)
            if (myModel) {
                myModel.rotation.y += 0.01;
            }

            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        // 事件觸發
        startBtn.addEventListener('click', async () => {
            await setupCamera();
            initThree();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        });
    </script>
</body>
</html>
