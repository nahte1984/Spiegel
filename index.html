<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiegel im Spiegel</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #754e79 0%, #130614 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        canvas { display: block; }
        
        /* 啟動介面 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); z-index: 100; transition: opacity 0.5s;
        }
        #start-btn {
            padding: 20px 40px; background: #fff; color: #000;
            border: none; border-radius: 50px; font-weight: bold;
            font-size: 1rem; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        
        #video-feed { display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">𝔠𝔯𝔶𝔰𝔱𝔞𝔩🪞🪞𝔪𝔦𝔯𝔯𝔬𝔯</button>
    </div>
    
    <video id="video-feed" autoplay playsinline muted></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('video-feed');

        let scene, camera, renderer, controls, videoTexture, myModel;

        // --- 1. 相機設定 (後置鏡頭) ---
        async function setupCamera() {
            try {
                const constraints = {
                    video: { facingMode: "user" },
                    audio: false
                };
                // 嘗試強制後置鏡頭，若失敗則使用預設
                const stream = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }));
                
                video.srcObject = stream;
                return new Promise(resolve => video.onloadedmetadata = resolve);
            } catch (err) {
                console.error("相機啟動失敗:", err);
                alert("無法存取後置鏡頭，請檢查 HTTPS 設定與權限。");
            }
        }

        // --- 2. Three.js 場景初始化 ---
        function initThree() {
            // 場景與背景
            scene = new THREE.Scene();
            
            // 攝影機
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 1.5);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            // 燈光設定 (為了展現模型的光澤)
            const ambientLight = new THREE.AmbientLight(0x81fffb, 3.0);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xeaa2ff, 4.0);
            mainLight.position.set(5, 10, 7.5);
            scene.add(mainLight);

            const pointLight = new THREE.PointLight(0xd700ea, 1, 100);
            pointLight.position.set(5, 10, 7.5);
            scene.add(pointLight);

            //const hemiLight = new THREE.HemisphereLight(0xe11ef3, 0x0d09c9, 0.75);
            //scene.add(hemiLight);

            // 控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 影片紋理
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.colorSpace = THREE.SRGBColorSpace;

            // --- 3. 載入 GLB 模型 ---
            const loader = new GLTFLoader();
            loader.load('crystal.glb', (gltf) => {
                myModel = gltf.scene;
                
                myModel.traverse((child) => {
                    if (child.isMesh) {
                        // 混合材質：50% 相機影像 + 50% 物理光澤
                        child.material = new THREE.MeshStandardMaterial({ 
                            map: videoTexture,
                            transparent: true,
                            opacity: 0.6,
                            metalness: 5, // 增加金屬質感
                            roughness: 0.2, // 降低粗糙度讓光澤更明顯
                            side: THREE.DoubleSide
                        });
                    }
                });

                // 自動居中模型
                const box = new THREE.Box3().setFromObject(myModel);
                const center = box.getCenter(new THREE.Vector3());
                myModel.position.sub(center);
                
                scene.add(myModel);
            }, undefined, (error) => {
                console.error('模型載入錯誤:', error);
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. 動畫迴圈 ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 模型持續向右自轉 (繞 Y 軸)
            if (myModel) {
                myModel.rotation.y += 0.01;
            }

            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        // 事件觸發
        startBtn.addEventListener('click', async () => {
            await setupCamera();
            initThree();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        });
    </script>
</body>
</html>
