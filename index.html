<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: #fff; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; z-index: 100; letter-spacing: 2px;
        }
        #video-feed { display: none; }
    </style>
</head>
<body>

    <button id="start-btn">按下允許就對ㄌ</button>
    <video id="video-feed" autoplay playsinline muted></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('video-feed');

        let scene, camera, renderer, controls, videoTexture;

        // --- 1. 初始化後置鏡頭 ---
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    // 強制呼叫後置鏡頭 (environment)
                    video: { facingMode: { exact: "environment" } }, 
                    audio: false
                }).catch(() => {
                    // 如果某些手機不支援 exact，則使用一般建議模式
                    return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                });
                
                video.srcObject = stream;
                video.play();
            } catch (err) {
                alert("無法存取後置相機！請確認權限與 HTTPS。");
            }
        }

        // --- 2. 初始化場景 ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 建立 VideoTexture
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.colorSpace = THREE.SRGBColorSpace;

            // --- 3. 載入自定義模型 ---
            const loader = new GLTFLoader();
            // 請將 'my_model.glb' 換成你上傳到伺服器或 GitHub 的路徑
            loader.load('crystal.glb', (gltf) => {
                const model = gltf.scene;
                
                // 核心邏輯：遍歷模型的所有零件，並將相機影像貼上去
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshBasicMaterial({ 
                            map: videoTexture,
                            side: THREE.DoubleSide // 內外都看得到投影
                        });
                    }
                });

                scene.add(model);
                
                // 自動調整模型大小並置中
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
            }, undefined, (error) => {
                console.error('模型載入失敗', error);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', async () => {
            await setupCamera();
            initThree();
            startBtn.style.display = 'none';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
